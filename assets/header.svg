<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 260" width="830" height="260">
<defs>
<style>
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}49%{opacity:1}50%,99%{opacity:0}}
@keyframes glitch{0%,82%,100%{transform:translate(0)}83%{transform:translate(-3px,0)}84%{transform:translate(3px,0)}85%{transform:translate(-1px,0)}86%{transform:translate(0)}}
@keyframes ghost{0%,82%,100%{opacity:0}83%{opacity:.55;transform:translate(4px,0)}84%{opacity:.55;transform:translate(-4px,0)}85%{opacity:.3;transform:translate(2px,0)}86%{opacity:0;transform:translate(0)}}
@keyframes floatA{0%,100%{transform:translate(0,0)}33%{transform:translate(7px,-11px)}66%{transform:translate(-4px,6px)}}
@keyframes floatB{0%,100%{transform:translate(0,0)}40%{transform:translate(-9px,8px)}70%{transform:translate(5px,-5px)}}
@keyframes floatC{0%,100%{transform:translate(0,0)}25%{transform:translate(6px,10px)}75%{transform:translate(-7px,-8px)}}
@keyframes scan{from{transform:translateY(-60px)}to{transform:translateY(320px)}}
@keyframes gridPulse{0%,100%{opacity:.07}50%{opacity:.14}}
@keyframes statusPulse{0%,100%{opacity:1;r:4}50%{opacity:.5;r:3}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes barGrow{from{height:0;y:260}to{height:260;y:0}}
.t{font-family:'Courier New',Courier,monospace}
.title{font-size:52px;font-weight:700;fill:#e6edf3;animation:slideIn .8s .1s both,glitch 9s 1.5s infinite}
.ghost{font-size:52px;font-weight:700;fill:#58a6ff;animation:ghost 9s 1.5s infinite}
.sub{font-size:17px;fill:#58a6ff;animation:slideIn .8s .4s both}
.tag{font-size:12px;fill:#3fb950;animation:slideIn .8s .65s both}
.cursor{font-size:19px;fill:#3fb950;animation:blink 1.1s .9s infinite}
.prompt{font-size:15px;fill:#3fb950;opacity:.7;animation:fadeIn 1s .05s both}
.grid{animation:gridPulse 5s ease-in-out infinite}
.pA{animation:floatA 5s ease-in-out infinite}
.pB{animation:floatB 6.5s ease-in-out infinite}
.pC{animation:floatC 4.5s ease-in-out infinite}
.scan-line{animation:scan 8s linear infinite;opacity:.025}
.dot{animation:statusPulse 2s ease-in-out infinite}
</style>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#161b22"/>
  <stop offset="100%" stop-color="#0d1117"/>
</linearGradient>
<linearGradient id="bar" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#58a6ff"/>
  <stop offset="100%" stop-color="#3fb950"/>
</linearGradient>
<linearGradient id="divider" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.5"/>
  <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
</linearGradient>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
  <feGaussianBlur stdDeviation="3.5" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="6" result="blur"/>
  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<clipPath id="clip">
  <rect width="830" height="260" rx="8"/>
</clipPath>
</defs>

<!-- Background -->
<rect width="830" height="260" fill="url(#bg)" rx="8"/>

<!-- Clipped content group -->
<g clip-path="url(#clip)">

<!-- Grid lines -->
<g class="grid" stroke="#58a6ff" stroke-width="0.4">
  <line x1="0" y1="52" x2="830" y2="52"/>
  <line x1="0" y1="104" x2="830" y2="104"/>
  <line x1="0" y1="156" x2="830" y2="156"/>
  <line x1="0" y1="208" x2="830" y2="208"/>
  <line x1="100" y1="0" x2="100" y2="260"/>
  <line x1="200" y1="0" x2="200" y2="260"/>
  <line x1="300" y1="0" x2="300" y2="260"/>
  <line x1="400" y1="0" x2="400" y2="260"/>
  <line x1="500" y1="0" x2="500" y2="260"/>
  <line x1="600" y1="0" x2="600" y2="260"/>
  <line x1="700" y1="0" x2="700" y2="260"/>
  <line x1="800" y1="0" x2="800" y2="260"/>
</g>

<!-- Scan line -->
<rect class="scan-line" x="0" y="0" width="830" height="55" fill="#58a6ff"/>

<!-- Floating particles -->
<circle class="pA" cx="68" cy="42" r="2.5" fill="#58a6ff" opacity=".5"/>
<circle class="pB" cx="770" cy="65" r="2" fill="#3fb950" opacity=".45"/>
<circle class="pC" cx="420" cy="28" r="1.8" fill="#d2a8ff" opacity=".4"/>
<circle style="animation:floatA 6s 1s ease-in-out infinite" cx="720" cy="195" r="2.5" fill="#58a6ff" opacity=".4"/>
<circle style="animation:floatB 5s 2s ease-in-out infinite" cx="140" cy="218" r="2" fill="#3fb950" opacity=".45"/>
<circle style="animation:floatC 7s .5s ease-in-out infinite" cx="580" cy="44" r="2" fill="#f78166" opacity=".4"/>
<circle style="animation:floatA 4.5s 1.5s ease-in-out infinite" cx="250" cy="235" r="1.5" fill="#58a6ff" opacity=".35"/>
<circle style="animation:floatB 8s 3s ease-in-out infinite" cx="790" cy="140" r="2.5" fill="#d2a8ff" opacity=".35"/>
<circle style="animation:floatC 5.5s .8s ease-in-out infinite" cx="350" cy="15" r="1.5" fill="#3fb950" opacity=".4"/>

<!-- Left accent bar -->
<rect x="0" y="0" width="4" height="260" fill="url(#bar)"/>

<!-- Prompt -->
<text class="t prompt" x="28" y="93">~/MariusYvard $</text>

<!-- Ghost title (glitch layer) -->
<text class="t ghost" x="28" y="147">MARIUS YVARD</text>

<!-- Main title -->
<text class="t title" x="28" y="147" filter="url(#glow)">MARIUS YVARD</text>

<!-- Divider -->
<rect x="28" y="158" width="430" height="1" fill="url(#divider)" style="animation:fadeIn .8s .35s both"/>

<!-- Subtitle -->
<text class="t sub" x="28" y="182">AI &amp; Automation Engineer · Data Scientist · Freelance</text>

<!-- Tagline -->
<text class="t tag" x="28" y="204">// Former Navy Officer · Arts et Métiers · Paris or remote</text>

<!-- Cursor -->
<text class="t cursor" x="28" y="230">▋</text>

<!-- Status badge (top right) -->
<g style="animation:fadeIn 1s .8s both">
  <rect x="662" y="18" width="148" height="24" rx="4" fill="#1f2937" stroke="#3fb950" stroke-width=".8"/>
  <circle class="dot" cx="676" cy="30" r="4" fill="#3fb950"/>
  <text class="t" x="686" y="34" font-size="11" fill="#3fb950">AVAILABLE NOW</text>
</g>

<!-- Version tag (top right, below badge) -->
<text class="t" x="695" y="58" font-size="10" fill="#6e7681" style="animation:fadeIn 1s 1s both">Paris · Remote</text>

</g><!-- end clip -->

<!-- Border -->
<rect width="830" height="260" fill="none" stroke="#30363d" stroke-width="1" rx="8"/>
<!-- Top accent line -->
<rect x="4" y="0" width="826" height="2" fill="#58a6ff" opacity=".45" rx="1"/>

</svg>