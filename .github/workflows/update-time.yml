name: Update Paris Time

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Write time JSON
        run: |
          mkdir -p dist
          TIME=$(TZ='Europe/Paris' date '+%H:%M')
          TZ_ABBR=$(TZ='Europe/Paris' date '+%Z')
          printf '{"time":"%s %s"}' "$TIME" "$TZ_ABBR" > dist/time.json
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/time.json
          git diff --staged --quiet || (git commit -m "chore: update paris time [skip ci]" && git push)
